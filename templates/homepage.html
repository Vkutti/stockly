<!DOCTYPE html>
<html lang="en">
<head>
<title>Stockly</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon (SVG + PNG + ICO fallback) -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='stocklysmall.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='stocklysmall.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='stocklysmall.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='stocklysmall.ico') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="back">

<header class="navbar" role="banner">
    <div class="navbar__inner">
        <a href="/" class="navbar__brand" aria-label="Stockly home">
            <img src="{{ url_for('static', filename='stockly-wordmark.svg') }}" alt="" width="343" height="146" class="navbar__logo" decoding="async">
        </a>
        <div class="buttonHolder">
            <form action="/">
                <button class="normalButton1" type="submit">
                    Predict
                </button>
            </form>

            <form action="/faqs">
                <button class="normalButton1" type="submit">
                    FAQs
                </button>
            </form>

            <form action="/aboutme">
                <button class="normalButton1" type="submit">
                    About Me
                </button>
            </form>
        </div>
    </div>
</header>

<main class="main-content">
<section>
        <p class="intro-text">Which stock are we predicting for today?</p>

    <form action="/stockinfo">
        <div class="searchBox">
            <input autocomplete="off" class="searchInput" type="text" name="stockname" id="stockname" placeholder="Type in the stock ticker symbol">
            <button class="searchButton" type="submit">
                <span class="btn-text">Predict</span>
                <span class="btn-spinner spin" aria-hidden="true"></span>
            </button>
        </div>
    </form>
</section>

<div class="footer-text" >
    <p class="footer-text">a website by</p>
    <a href="/aboutme" class="link">Venkat Kutti</a>
</div>
</main>

</body>
    <script>
    // Show spinner on predict button when clicked/submitted.
    // We add a short delay before submitting to ensure the spinner can render
    (function(){
        const searchBox = document.querySelector('.searchBox');
        if (!searchBox) return;
        const form = searchBox.closest('form');
        if (!form) return;
        const btn = form.querySelector('.searchButton');
        if (!btn) return;

        // Click handler: show spinner, add pointer handlers to pause while pressing, then submit after a short delay
        const spinner = btn.querySelector('.btn-spinner');
        btn.addEventListener('click', function (e) {
            if (btn.classList.contains('loading')) return;
            e.preventDefault();
            btn.classList.add('loading');
            btn.disabled = true;

            // If we have a spinner, attach pointer handlers so holding the button pauses the spinner
            if (spinner) {
                btn.addEventListener('pointerdown', function () { spinner.classList.add('paused'); });
                btn.addEventListener('pointerup', function () { spinner.classList.remove('paused'); });
                btn.addEventListener('pointerleave', function () { spinner.classList.remove('paused'); });
                btn.addEventListener('pointercancel', function () { spinner.classList.remove('paused'); });
            }

            // Allow one frame to paint the spinner, then submit
            requestAnimationFrame(function () {
                setTimeout(function () { form.submit(); }, 80);
            });
        });

        // Fallback: also handle form submit (e.g., when triggered by Enter key)
        form.addEventListener('submit', function (e) {
            if (!btn.classList.contains('loading')) {
                btn.classList.add('loading');
                btn.disabled = true;
            }
        });
    })();
    </script>
</html>
